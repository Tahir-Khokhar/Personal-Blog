{% extends 'base.html' %}
{% block title %}My Posts{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <h1 class="mb-4">My Posts</h1>
        {% for post in posts %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ post.title }}</h5>
                <p class="text-muted">{{ post.created_at|date:"M d, Y" }}</p>
                <span class="badge bg-{% if post.status == 'published' %}success{% else %}secondary{% endif %}">{{ post.status }}</span>
                <div class="mt-2">
                    <a href="{% url 'post_edit' post.slug %}" class="btn btn-primary btn-sm">Edit</a>
                    <a href="{% url 'post_detail' post.slug %}" class="btn btn-outline-primary btn-sm">View</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-muted">You haven't created any posts yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
