{% extends 'base.html' %}
{% block title %}Password reset sent{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h1 class="h4 mb-0">Check your email</h1>
      </div>
      <div class="card-body">
        <p class="text-muted">If an account exists for the email you provided, we sent a password reset link.</p>
        <a class="btn btn-primary w-100" href="{% url 'login' %}">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
