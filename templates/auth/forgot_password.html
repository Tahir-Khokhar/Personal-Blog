{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header">
                <h1 class="h4 mb-0">Forgot Password</h1>
            </div>
            <div class="card-body">
                <p class="text-muted">Enter your email address and we'll send you an OTP to reset your password.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" required value="{{ request.POST.email|default:'' }}">
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Send OTP</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
