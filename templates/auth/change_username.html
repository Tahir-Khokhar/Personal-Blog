{% extends 'base.html' %}
{% block title %}Change Username{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header">
                <h1 class="h4 mb-0">Change Username</h1>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">New Username</label>
                        <input class="form-control" type="text" name="username" required value="{{ form.username.value|default:'' }}">
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Update Username</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'dashboard' %}">Back to dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
